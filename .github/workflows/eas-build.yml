name: EAS Build (Android APK)

# Builds the Android APK in Expo's cloud (no local machine needed).
# Trigger it either automatically on push, or manually from the
# GitHub "Actions" tab (Run workflow button) so you can pick a profile.
on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile (matches mobile/eas.json)'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - release-apk
          - production

jobs:
  build:
    name: Build Android APK on EAS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Trigger EAS Build (non-interactive, cloud-hosted)
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --no-wait

      # The command above only *queues* the build on Expo's servers and
      # returns immediately with a link. Check progress/download the APK
      # at https://expo.dev — under your project's Builds tab, from any
      # browser including on your phone.
      - name: Where to find the build
        run: echo "Build queued. Open https://expo.dev, go to this project's Builds tab, and download the .apk once it finishes (usually 10-20 min)."
